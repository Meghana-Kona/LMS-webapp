{% extends "base.html" %}
{% block title %}Member Login - LMS{% endblock %}

{% block content %}
<div class="row justify-content-center align-items-center h-100 fade-up" style="min-height: 70vh;">
  <div class="col-md-6 col-lg-5">
    
    <div class="text-center mb-4">
      <i class="bi bi-person-bounding-box text-gradient" style="font-size: 3rem;"></i>
      <h2 class="fw-bold mt-2">Member Login</h2>
      <p class="text-secondary">Welcome back to Nexus Library</p>
    </div>

    <div class="glass-card p-5">
      <form method="POST" action="/member/login">
        <div class="mb-4">
          <label class="form-label"><i class="bi bi-envelope"></i> Email Address</label>
          <input type="email" name="email" class="form-control form-control-lg"
                 placeholder="name@example.com"
                 value="{{ request.form.email if error else '' }}" required autofocus>
        </div>
        
        <div class="mb-4">
          <label class="form-label"><i class="bi bi-lock"></i> Password</label>
          <input type="password" name="password" class="form-control form-control-lg"
                 placeholder="Enter password" required>
        </div>
        
        {% if error %}
          <div class="alert alert-danger px-4 py-3 mb-4 rounded-3 d-flex align-items-center">
             <i class="bi bi-exclamation-octagon-fill me-2 fs-5"></i> 
             <div>{{ error }}</div>
          </div>
        {% endif %}
        
        <button class="btn btn-success btn-lg w-100 mb-4"><i class="bi bi-box-arrow-in-right"></i> Sign In</button>
      </form>
      
      <div class="text-center text-secondary small pt-3 border-top" style="border-color: rgba(255,255,255,0.05) !important;">
        Don't have an account? <a href="/member/signup" class="text-accent text-decoration-none fw-bold" style="color: var(--accent-primary);">Join Now</a>
      </div>
    </div>
    
  </div>
</div>
{% endblock %}
