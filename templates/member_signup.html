{% extends "base.html" %}
{% block title %}Join Library - LMS{% endblock %}

{% block content %}
<div class="row justify-content-center align-items-center h-100 fade-up py-4">
  <div class="col-md-8 col-lg-6">
    
    <div class="text-center mb-4">
      <i class="bi bi-person-plus text-gradient" style="font-size: 3rem;"></i>
      <h2 class="fw-bold mt-2">Become a Member</h2>
      <p class="text-secondary">Unlock thousands of titles and resources instantly</p>
    </div>

    <div class="glass-card p-5">
      <form method="POST" action="/member/signup">
        <div class="row g-3">
          <div class="col-md-6 mb-3">
            <label class="form-label"><i class="bi bi-person"></i> Full Name</label>
            <input type="text" name="name" class="form-control form-control-lg"
                   placeholder="John Doe" required autofocus>
          </div>
          
          <div class="col-md-6 mb-3">
            <label class="form-label"><i class="bi bi-telephone"></i> Phone Number</label>
            <input type="tel" name="phone" class="form-control form-control-lg"
                   placeholder="+1 (555) 000-0000" required>
          </div>
        </div>

        <div class="mb-4">
          <label class="form-label"><i class="bi bi-envelope"></i> Email Address</label>
          <input type="email" name="email" class="form-control form-control-lg"
                 placeholder="name@example.com" required>
        </div>
        
        <div class="mb-4">
          <label class="form-label"><i class="bi bi-shield-check"></i> Create Password</label>
          <input type="password" name="password" class="form-control form-control-lg"
                 placeholder="8+ characters recommended" required>
        </div>
        
        {% if error %}
          <div class="alert alert-danger px-4 py-3 mb-4 rounded-3 d-flex align-items-center">
             <i class="bi bi-exclamation-circle-fill me-2 fs-5"></i> 
             <div>{{ error }}</div>
          </div>
        {% endif %}
        
        <button class="btn btn-primary btn-lg w-100 mt-2 mb-4"><i class="bi bi-rocket-takeoff"></i> Complete Registration</button>
      </form>
      
      <div class="text-center text-secondary small pt-3 border-top" style="border-color: rgba(255,255,255,0.05) !important;">
        Already a member? <a href="/member/login" class="text-decoration-none fw-bold" style="color: var(--accent-primary);">Log in here</a>
      </div>
    </div>
    
  </div>
</div>
{% endblock %}
